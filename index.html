<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>卑作 ランキングビューア</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --line:#e3e6ea; --text:#1f2430;
    --muted:#6b7280; --accent:#3b6ef5; --accent-weak:#eaf0ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px;}
  header h1{margin:0;font-size:17px;font-weight:700;}
  header p{margin:2px 0 0;font-size:12px;color:var(--muted);}
  main{max-width:900px;margin:0 auto;padding:16px;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:14px;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:11px;color:var(--muted);}
  select{padding:7px 9px;border:1px solid var(--line);border-radius:8px;
    background:#fff;font-size:14px;min-width:130px;}
  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
  .tab{padding:7px 14px;border:1px solid var(--line);background:#fff;border-radius:999px;
    cursor:pointer;font-size:13px;color:var(--muted);}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .tab-spacer{flex:1 1 auto;}
  .link-btn{padding:7px 12px;border:1px dashed var(--line);background:#fff;border-radius:999px;
    cursor:pointer;font-size:13px;color:var(--accent);}
  .link-btn:hover{background:var(--accent-weak);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line);}
  th{background:#fafbfc;font-size:12px;color:var(--muted);font-weight:600;position:sticky;top:0;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  tr:last-child td{border-bottom:none;}
  .rank{font-weight:700;width:56px;}
  .btn{padding:5px 10px;border:1px solid var(--line);background:#fff;border-radius:7px;
    cursor:pointer;font-size:12px;color:var(--accent);}
  .btn:hover{background:var(--accent-weak);}
  .more{display:block;width:100%;padding:11px;border:none;border-top:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;}
  .msg{padding:26px;text-align:center;color:var(--muted);font-size:14px;}
  .chart-wrap{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;}
  .chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
    flex-wrap:wrap;gap:8px;}
  .chart-head h2{margin:0;font-size:15px;}
  .hidden{display:none;}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;}
  .chip{padding:6px 13px;border:1px solid var(--line);background:#fff;border-radius:999px;
    cursor:pointer;font-size:13px;color:var(--text);}
  .chip.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .chip.custom{background:var(--accent-weak);border-color:var(--accent);color:var(--accent);}
  .chip.custom .x{margin-left:6px;font-weight:700;}
  .add-rank{display:flex;gap:6px;align-items:center;}
  .add-rank input{width:80px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px;}
  .add-rank button{padding:6px 12px;border:1px solid var(--accent);background:var(--accent);
    color:#fff;border-radius:7px;cursor:pointer;font-size:13px;}
  .hint{font-size:12px;color:var(--muted);margin-bottom:10px;}
</style>
</head>
<body>
<header>
  <h1>卑作 ランキングビューア</h1>
  <p>イベント・大会のランキングと順位推移</p>
</header>
<main>
  <div class="controls">
    <div class="field">
      <label>イベント / 大会</label>
      <select id="categorySel">
        <option value="event">イベント</option>
        <option value="tournament">大会</option>
      </select>
    </div>
    <div class="field" id="periodField">
      <label>月</label>
      <select id="periodSel"></select>
    </div>
    <div class="field">
      <label>イベント / 大会名</label>
      <select id="contestSel"></select>
    </div>
    <div class="field" id="dayField">
      <label>日</label>
      <select id="daySel"></select>
    </div>
  </div>

  <div class="tabs" id="kindTabs"></div>

  <div id="rankingView">
    <div class="card">
      <table id="rankTable"><thead></thead><tbody></tbody></table>
      <button class="more hidden" id="moreBtn">もっと見る</button>
    </div>
    <div class="msg hidden" id="rankMsg"></div>
  </div>

  <div id="trendView" class="chart-wrap hidden">
    <div class="chart-head">
      <h2 id="trendTitle"></h2>
      <button class="btn" id="trendBack">← 一覧へ戻る</button>
    </div>
    <canvas id="trendChart" height="140"></canvas>
    <div class="msg hidden" id="trendMsg"></div>
  </div>

  <div id="borderView" class="chart-wrap hidden">
    <div class="chart-head">
      <h2 id="borderTitle">ボーダー推移</h2>
      <button class="btn" id="borderBack">← 一覧へ戻る</button>
    </div>
    <div class="hint">見たい順位を選択(複数可)。日ごとの必要ポイントの推移を比較できます。</div>
    <div class="chip-row" id="presetChips"></div>
    <div class="chip-row" id="customChips"></div>
    <div class="add-rank">
      <span style="font-size:13px;color:var(--muted);">順位を追加:</span>
      <input type="number" id="customRankInput" min="1" placeholder="例: 500">
      <button id="addRankBtn">追加</button>
    </div>
    <canvas id="borderChart" height="140"></canvas>
    <div class="msg hidden" id="borderMsg"></div>
  </div>
</main>

<script>
const API = "https://hisaku-ranking-api.rimuse.workers.dev";

const KIND_LABEL = {
  event_user:"個人", event_alliance:"同盟",
  tour_ichigeki:"一撃", tour_soudamage:"総ダメージ",
};
const KINDS_BY_TYPE = {
  event:["event_user","event_alliance"],
  tournament:["tour_ichigeki","tour_soudamage"],
};
// ボーダー推移のプリセット順位(種別ごとに見たいボーダーが異なるため個別設定)
const BORDER_PRESETS = {
  event_user:     [10, 50, 100, 150, 250],
  event_alliance: [5, 10, 15, 20, 30],
};
const MAX_BORDER_RANKS = 8; // 見づらくなりすぎないための上限(プリセット+自由入力の合計)
const BORDER_COLORS = ["#3b6ef5","#e0578a","#22a366","#e0a12a","#8a5ce0","#0fa3b1","#e0522a","#5c6bc0"];

const state = { contests:[], byPeriod:{}, tournaments:[], category:"event",
                contest:null, kind:null, day:1,
                afterRank:0, rows:[], chart:null,
                borderRanks:new Set(), borderCustomRanks:new Set(), borderChart:null };

const $ = id => document.getElementById(id);
async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
const fmt = n => (n===null||n===undefined||n==="") ? "-" : Number(n).toLocaleString();

// ---- 初期化: contests 一覧を取得 ----
async function init(){
  let data;
  try { data = await fetchJSON(`${API}/contests`); }
  catch(e){ $("rankMsg").textContent = "APIに接続できません: "+e.message;
            $("rankMsg").classList.remove("hidden"); return; }
  state.contests = data.contests || [];
  if(state.contests.length===0){
    showRankMsg("まだデータがありません。"); return;
  }
  state.byPeriod = {};
  for(const c of state.contests){
    if(c.ctype !== "event") continue;
    (state.byPeriod[c.period] = state.byPeriod[c.period] || []).push(c);
  }
  state.tournaments = state.contests.filter(c=>c.ctype !== "event")
    .sort((a,b)=> String(b.period).localeCompare(String(a.period)));

  $("categorySel").value = state.category;
  $("categorySel").onchange = onCategoryChange;
  $("periodSel").onchange = onPeriodChange;
  $("contestSel").onchange = onContestChange;
  $("daySel").onchange = ()=>{ state.day=+$("daySel").value; loadRanking(true); };
  $("moreBtn").onclick = ()=>loadRanking(false);
  $("trendBack").onclick = ()=>{ $("trendView").classList.add("hidden");
                                 $("rankingView").classList.remove("hidden"); };
  $("borderBack").onclick = ()=>{ $("borderView").classList.add("hidden");
                                  $("rankingView").classList.remove("hidden"); };
  $("addRankBtn").onclick = addCustomRank;
  $("customRankInput").addEventListener("keydown", e=>{ if(e.key==="Enter") addCustomRank(); });
  onCategoryChange();
}

function onCategoryChange(){
  state.category = $("categorySel").value;
  const isEvent = state.category === "event";
  $("periodField").style.display = isEvent ? "" : "none";
  if(isEvent){
    const periods = Object.keys(state.byPeriod).sort().reverse();
    $("periodSel").innerHTML = periods.map(p=>`<option>${p}</option>`).join("");
    onPeriodChange();
  } else {
    $("contestSel").innerHTML = state.tournaments.map((c,i)=>
      `<option value="${i}">${c.name || c.contest}</option>`).join("");
    onContestChange();
  }
}

function onPeriodChange(){
  const list = state.byPeriod[$("periodSel").value] || [];
  $("contestSel").innerHTML = list.map((c,i)=>
    `<option value="${i}">${c.name || c.contest}</option>`).join("");
  onContestChange();
}

function onContestChange(){
  const list = state.category === "event"
    ? (state.byPeriod[$("periodSel").value] || [])
    : state.tournaments;
  state.contest = list[+$("contestSel").value] || list[0];
  if(!state.contest){
    $("kindTabs").innerHTML = "";
    $("trendView").classList.add("hidden");
    $("borderView").classList.add("hidden");
    $("rankingView").classList.remove("hidden");
    showRankMsg("この条件のデータはまだありません。");
    return;
  }
  const kinds = KINDS_BY_TYPE[state.contest.ctype] || [];
  state.kind = kinds[0];

  // 日セレクタ: イベントは開催日数ぶん、大会は1日のみ
  const isEvent = state.contest.ctype === "event";
  $("dayField").style.display = isEvent ? "" : "none";
  if(isEvent){
    const d0 = new Date(state.contest.start_date);
    const d1 = new Date(state.contest.end_date);
    const days = Math.round((d1-d0)/86400000) + 1;
    let opts = "";
    for(let i=1;i<=days;i++) opts += `<option value="${i}">${i}日目</option>`;
    $("daySel").innerHTML = opts;
  }
  state.day = 1;

  renderKindTabs(isEvent);

  $("trendView").classList.add("hidden");
  $("borderView").classList.add("hidden");
  $("rankingView").classList.remove("hidden");
  loadRanking(true);
}

function renderKindTabs(isEvent){
  const kinds = KINDS_BY_TYPE[state.contest.ctype] || [];
  const tabsHtml = kinds.map(k=>
    `<div class="tab ${k===state.kind?'active':''}" data-k="${k}">${KIND_LABEL[k]}</div>`
  ).join("");
  // ボーダー推移は複数日にわたるイベントのみ意味を持つ(大会は1日のみのため対象外)
  const borderBtn = isEvent ? `<div class="link-btn" id="borderOpenBtn">📈 ボーダー推移</div>` : "";
  $("kindTabs").innerHTML = tabsHtml + `<div class="tab-spacer"></div>` + borderBtn;

  $("kindTabs").querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{
      state.kind = t.dataset.k;
      const borderOpen = !$("borderView").classList.contains("hidden");
      if(borderOpen){
        // ボーダー推移画面を開いたまま種別だけ切り替える(個人⇔同盟でプリセットが違うため)
        resetBorderSelection();
        renderBorderChips();
        loadBorderTrend();
      } else {
        $("kindTabs").querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t));
        loadRanking(true);
      }
    };
  });
  const openBtn = $("borderOpenBtn");
  if(openBtn) openBtn.onclick = openBorderView;
}

function showRankMsg(m){ $("rankMsg").textContent=m; $("rankMsg").classList.remove("hidden"); }
function hideRankMsg(){ $("rankMsg").classList.add("hidden"); }

// ---- ランキング表示 ----
async function loadRanking(reset){
  if(reset){ state.afterRank=0; state.rows=[]; }
  hideRankMsg();
  const c = state.contest, k = state.kind;
  const url = `${API}/ranking?kind=${k}&contest=${encodeURIComponent(c.contest)}`+
              `&period=${c.period}&day=${state.day}&limit=100&after_rank=${state.afterRank}`;
  let data;
  try { data = await fetchJSON(url); }
  catch(e){ showRankMsg("取得エラー: "+e.message); return; }
  state.rows.push(...(data.rows||[]));
  renderTable();
  if(data.next_after_rank){ state.afterRank = data.next_after_rank;
    $("moreBtn").classList.remove("hidden"); }
  else $("moreBtn").classList.add("hidden");
  if(state.rows.length===0) showRankMsg("この条件のデータはまだありません。");
}

function renderTable(){
  const k = state.kind, isEvent = state.contest.ctype==="event";
  const isIndividual = k!=="event_alliance";
  const cols = [];
  cols.push(`<th class="rank">順位</th>`);
  cols.push(`<th>${k==="event_alliance"?"同盟名":"名前"}</th>`);
  if(isIndividual) cols.push(`<th>ID</th>`);
  if(k==="event_user") cols.push(`<th>所属同盟</th>`);
  if(k==="event_alliance") cols.push(`<th class="num">人数</th>`);
  cols.push(`<th class="num">${k.startsWith("tour")?"ダメージ":"ポイント"}</th>`);
  if(isEvent) cols.push(`<th></th>`);
  $("rankTable").querySelector("thead").innerHTML = `<tr>${cols.join("")}</tr>`;

  const body = state.rows.map(r=>{
    const cells = [];
    cells.push(`<td class="rank">${r.rank}</td>`);
    cells.push(`<td>${escapeHtml(r.entity_name)||"-"}</td>`);
    if(isIndividual) cells.push(`<td>${escapeHtml(r.entity_id)||"-"}</td>`);
    if(k==="event_user") cells.push(`<td>${escapeHtml(r.alliance_name)||"-"}</td>`);
    if(k==="event_alliance") cells.push(`<td class="num">${fmt(r.member_count)}</td>`);
    cells.push(`<td class="num">${fmt(r.points)}</td>`);
    if(isEvent) cells.push(`<td><button class="btn" data-id="${encodeURIComponent(r.entity_id)}" `+
      `data-name="${escapeHtml(r.entity_name)}">推移</button></td>`);
    return `<tr>${cells.join("")}</tr>`;
  }).join("");
  $("rankTable").querySelector("tbody").innerHTML = body;

  $("rankTable").querySelectorAll("button[data-id]").forEach(b=>{
    b.onclick = ()=>showTrend(decodeURIComponent(b.dataset.id), b.dataset.name);
  });
}

function escapeHtml(s){ return String(s??"").replace(/[&<>"]/g,
  c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---- 推移(個人/同盟エンティティ単位) ----
async function showTrend(entityId, name){
  $("rankingView").classList.add("hidden");
  $("borderView").classList.add("hidden");
  $("trendView").classList.remove("hidden");
  $("trendMsg").classList.add("hidden");
  $("trendTitle").textContent = `${KIND_LABEL[state.kind]}：${name} の推移`;
  const c = state.contest;
  const url = `${API}/trend?kind=${state.kind}&contest=${encodeURIComponent(c.contest)}`+
              `&period=${c.period}&entity_id=${encodeURIComponent(entityId)}`;
  let data;
  try { data = await fetchJSON(url); }
  catch(e){ $("trendMsg").textContent="取得エラー: "+e.message;
            $("trendMsg").classList.remove("hidden"); return; }
  const t = data.trend||[];
  if(t.length===0){ $("trendMsg").textContent="推移データがありません。";
    $("trendMsg").classList.remove("hidden"); if(state.chart) state.chart.destroy(); return; }
  renderChart(t);
}

function renderChart(t){
  const labels = t.map(x=>x.day+"日目");
  const ranks = t.map(x=>x.rank);
  const points = t.map(x=>Number(x.points));
  if(state.chart) state.chart.destroy();
  state.chart = new Chart($("trendChart"), {
    data:{ labels, datasets:[
      { type:"line", label:"順位", data:ranks, yAxisID:"yRank",
        borderColor:"#3b6ef5", backgroundColor:"#3b6ef5", tension:.2 },
      { type:"bar", label:"ポイント", data:points, yAxisID:"yPts",
        backgroundColor:"rgba(59,110,245,.18)", borderColor:"rgba(59,110,245,.4)" },
    ]},
    options:{ responsive:true, interaction:{mode:"index",intersect:false},
      scales:{
        yRank:{ position:"left", reverse:true, title:{display:true,text:"順位"},
                ticks:{precision:0} },
        yPts:{ position:"right", grid:{drawOnChartArea:false},
               title:{display:true,text:"ポイント"} },
      } }
  });
}

// ---- ボーダー推移(指定順位の必要ポイント比較) ----
function openBorderView(){
  $("rankingView").classList.add("hidden");
  $("trendView").classList.add("hidden");
  $("borderView").classList.remove("hidden");
  $("borderTitle").textContent = `${KIND_LABEL[state.kind]}のボーダー推移`;
  resetBorderSelection();
  renderBorderChips();
  loadBorderTrend();
}

function resetBorderSelection(){
  // 種別切り替え時、プリセットの上位いくつかを初期選択にしておく(空だと何も表示されないため)
  const presets = BORDER_PRESETS[state.kind] || [];
  state.borderRanks = new Set(presets.slice(0, 3));
  state.borderCustomRanks = new Set();
  $("borderTitle").textContent = `${KIND_LABEL[state.kind]}のボーダー推移`;
}

function renderBorderChips(){
  const presets = BORDER_PRESETS[state.kind] || [];
  $("presetChips").innerHTML = presets.map(r=>
    `<div class="chip ${state.borderRanks.has(r)?'selected':''}" data-r="${r}">${r}位</div>`
  ).join("");
  $("presetChips").querySelectorAll(".chip").forEach(chip=>{
    chip.onclick = ()=> toggleBorderRank(Number(chip.dataset.r));
  });
  renderCustomChips();
}

function renderCustomChips(){
  $("customChips").innerHTML = [...state.borderCustomRanks].sort((a,b)=>a-b).map(r=>
    `<div class="chip custom selected" data-r="${r}">${r}位<span class="x" data-remove="${r}">×</span></div>`
  ).join("");
  $("customChips").querySelectorAll("[data-remove]").forEach(el=>{
    el.onclick = (ev)=>{ ev.stopPropagation();
      const r = Number(el.dataset.remove);
      state.borderCustomRanks.delete(r);
      state.borderRanks.delete(r);
      renderCustomChips();
      loadBorderTrend();
    };
  });
}

function toggleBorderRank(r){
  if(state.borderRanks.has(r)){
    state.borderRanks.delete(r);
  } else {
    if(state.borderRanks.size >= MAX_BORDER_RANKS){
      alert(`一度に比較できるのは${MAX_BORDER_RANKS}件までです。`);
      return;
    }
    state.borderRanks.add(r);
  }
  renderBorderChips();
  loadBorderTrend();
}

function addCustomRank(){
  const input = $("customRankInput");
  const r = parseInt(input.value, 10);
  if(!r || r < 1){ input.focus(); return; }
  if(state.borderRanks.size >= MAX_BORDER_RANKS && !state.borderRanks.has(r)){
    alert(`一度に比較できるのは${MAX_BORDER_RANKS}件までです。`);
    return;
  }
  state.borderCustomRanks.add(r);
  state.borderRanks.add(r);
  input.value = "";
  renderBorderChips();
  loadBorderTrend();
}

async function loadBorderTrend(){
  $("borderMsg").classList.add("hidden");
  const ranks = [...state.borderRanks].sort((a,b)=>a-b);
  if(ranks.length===0){
    if(state.borderChart) state.borderChart.destroy();
    $("borderMsg").textContent = "比較したい順位を選択してください。";
    $("borderMsg").classList.remove("hidden");
    return;
  }
  const c = state.contest;
  const url = `${API}/rank_trend?kind=${state.kind}&contest=${encodeURIComponent(c.contest)}`+
              `&period=${c.period}&ranks=${ranks.join(",")}`;
  let data;
  try { data = await fetchJSON(url); }
  catch(e){ $("borderMsg").textContent="取得エラー: "+e.message;
            $("borderMsg").classList.remove("hidden"); return; }
  renderBorderChart(data.ranks || {}, ranks);
}

function renderBorderChart(byRank, ranks){
  // 日の和集合をx軸にする(順位によって記録が始まる日がずれる可能性があるため)
  const daySet = new Set();
  for(const r of ranks) (byRank[r]||[]).forEach(row=>daySet.add(row.day));
  const days = [...daySet].sort((a,b)=>a-b);
  if(days.length===0){
    if(state.borderChart) state.borderChart.destroy();
    $("borderMsg").textContent = "この条件のデータはまだありません。";
    $("borderMsg").classList.remove("hidden");
    return;
  }
  $("borderMsg").classList.add("hidden");

  const datasets = ranks.map((r, i)=>{
    const rows = byRank[r] || [];
    const byDay = {};
    rows.forEach(row=>{ byDay[row.day] = row; });
    const points = days.map(d=> byDay[d] ? Number(byDay[d].points) : null);
    const names  = days.map(d=> byDay[d] ? byDay[d].entity_name : null);
    const color = BORDER_COLORS[i % BORDER_COLORS.length];
    return {
      label: `${r}位`, data: points, borderColor: color, backgroundColor: color,
      tension:.2, spanGaps:true, _entityNames: names,
    };
  });

  if(state.borderChart) state.borderChart.destroy();
  state.borderChart = new Chart($("borderChart"), {
    type:"line",
    data:{ labels: days.map(d=>d+"日目"), datasets },
    options:{
      responsive:true, interaction:{mode:"index",intersect:false},
      plugins:{ tooltip:{ callbacks:{
        afterLabel: (ctx)=>{
          const name = ctx.dataset._entityNames?.[ctx.dataIndex];
          return name ? `　${name}` : "";
        }
      } } },
      scales:{ y:{ title:{display:true,text:"必要ポイント"} } },
    }
  });
}

init();
</script>
</body>
